# 伺服器通訊埠
server:
  port: 8080

# MySQL 連線設定
spring:
  datasource:
    url: jdbc:mysql://localhost:3307/my_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

# JPA 設定：自動建表 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Redis 連線設定
  data:
    redis:
      host: localhost
      port: 6379